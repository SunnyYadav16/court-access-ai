# Alembic configuration file for CourtAccess AI database migrations.
# This file is read by `alembic` CLI and by db/migrations/env.py.
#
# Run from the project root:
#   alembic --config db/migrations/alembic.ini upgrade head
#   alembic --config db/migrations/alembic.ini revision --autogenerate -m "description"
#   alembic --config db/migrations/alembic.ini downgrade -1

[alembic]
version_table = courtaccess_alembic_version
# Path to the migration scripts, relative to this file's location.
script_location = %(here)s

# Path to the versions directory, relative to script_location.
version_locations = %(here)s/versions

# Template to use for new migration files.
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
