# ══════════════════════════════════════════════════════════════════════════════
# dvc.yaml — CourtAccess AI root DVC pipeline
#
# Model weights are tracked via individual .dvc pointer files in models/:
#   models/whisper-large-v3.dvc
#   models/nllb-200-distilled-1.3B-ct2.dvc
#   models/piper-tts-es.dvc
#   models/piper-tts-pt.dvc
#   models/piper-tts-en.dvc
#   models/silero-vad-v4.dvc
#
# Usage:
#   dvc pull     — pull all model weights from gs://courtaccess-ai-models
#   dvc push     — push after running setup_models.sh to update a model
#   dvc status   — check what has changed vs. remote
#
# NOTE: There are no pipeline stages defined here.
# The form catalog and translated forms are stored in PostgreSQL + GCS,
# not as DVC-tracked files on disk. The old scrape_forms / validate_catalog /
# pretranslate_forms stages that referenced courtaccess/data/form_catalog.json
# and forms/ have been removed — those paths no longer exist in the codebase.
# ══════════════════════════════════════════════════════════════════════════════

stages: {}
