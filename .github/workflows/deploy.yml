# .github/workflows/deploy.yml
#
# Requirements covered:
#   4 — Model registry push + deployment to GCE VM
#   5 — Email notifications on success, failure, and rollback
#   6 — Automated rollback when post-deploy smoke tests fail
#
# Trigger: explicit version tags only (v1.0.0, v1.2.3, etc.)
# This gives control over what reaches production — critical for
# a court-facing system where untested releases have real consequences.
#
# Job chain:
#   validate-before-deploy → deploy-to-vm → post-deploy-validation
#                                               ↓ (if: failure)
#                                          rollback-on-failure
#
# Required GitHub Actions repository variables (Settings → Variables):
#   GCP_PROJECT_ID, GCP_REGION, GCP_ARTIFACT_REGISTRY, GCP_ARTIFACT_REPOSITORY
#   APP_ENV, DEBUG, ALLOWED_ORIGINS, POSTGRES_DB, POSTGRES_HOST, POSTGRES_PORT
#   GCS_BUCKET_*, GCIP_AUTH_DOMAIN, GCIP_PROJECT_ID
#   VERTEX_PROJECT_ID, VERTEX_LOCATION, VERTEX_LEGAL_LLM_MODEL, LEGAL_VERIFY_TIMEOUT
#   SIGNED_URL_EXPIRY_SECONDS, AIRFLOW_BASE_URL, MLFLOW_TRACKING_URI
#   USE_REAL_*, ACCESS_TOKEN_EXPIRE_MINUTES, ALGORITHM, VALIDATION_CONFIDENCE_THRESHOLD
#   VM_SSH_HOST, VM_SSH_USER, VM_EXTERNAL_IP
#
# Required GitHub Actions secrets (Settings → Secrets):
#   GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
#   VM_SSH_PRIVATE_KEY, VM_KNOWN_HOSTS
#   SECRET_KEY, POSTGRES_USER, POSTGRES_PASSWORD
#   GCIP_API_KEY, REDIS_URL, ROOM_JWT_SECRET
#   AIRFLOW_USERNAME, AIRFLOW_PASSWORD
#   NOTIFY_EMAIL_FROM, NOTIFY_EMAIL_TO, NOTIFY_EMAIL_PASSWORD

name: Deploy to VM

on:
  push:
    tags:
      - "v*.*.*"   # Only on explicit semver tags: v1.0.0, v1.2.3, etc.

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel in-progress deployments

defaults:
  run:
    shell: bash

env:
  REGISTRY: ${{ vars.GCP_ARTIFACT_REGISTRY }}
  REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY }}
  API_GPU_IMAGE: courtaccess-api-gpu
  AIRFLOW_IMAGE: courtaccess-airflow

# ══════════════════════════════════════════════════════════════════════════════
# Job 1 — validate-before-deploy
#
# Lightweight pre-deploy gate — NOT the full test suite (that ran on the PR).
# Blocks deployment if bias detection has critical flags or model registry
# integrity is broken.
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  validate-before-deploy:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest

    env:
      # ── App ──
      APP_ENV: ${{ vars.APP_ENV }}
      DEBUG: ${{ vars.DEBUG }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
      # ── Database ──
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
      POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
      # ── GCP ──
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_SERVICE_ACCOUNT_JSON: ""
      GCS_BUCKET_UPLOADS: ${{ vars.GCS_BUCKET_UPLOADS }}
      GCS_BUCKET_TRANSLATED: ${{ vars.GCS_BUCKET_TRANSLATED }}
      GCS_BUCKET_FORMS: ${{ vars.GCS_BUCKET_FORMS }}
      GCS_BUCKET_MODELS: ${{ vars.GCS_BUCKET_MODELS }}
      GCS_BUCKET_TRANSCRIPTS: ${{ vars.GCS_BUCKET_TRANSCRIPTS }}
      SIGNED_URL_EXPIRY_SECONDS: ${{ vars.SIGNED_URL_EXPIRY_SECONDS }}
      # ── Firebase/GCIP ──
      GCIP_API_KEY: ${{ secrets.GCIP_API_KEY }}
      GCIP_AUTH_DOMAIN: ${{ vars.GCIP_AUTH_DOMAIN }}
      GCIP_PROJECT_ID: ${{ vars.GCIP_PROJECT_ID }}
      # ── Vertex AI ──
      VERTEX_PROJECT_ID: ${{ vars.VERTEX_PROJECT_ID }}
      VERTEX_LOCATION: ${{ vars.VERTEX_LOCATION }}
      VERTEX_LEGAL_LLM_MODEL: ${{ vars.VERTEX_LEGAL_LLM_MODEL }}
      LEGAL_VERIFY_TIMEOUT: ${{ vars.LEGAL_VERIFY_TIMEOUT }}
      VERTEX_MAX_RETRIES: ${{ vars.VERTEX_MAX_RETRIES }}
      # ── Airflow ──
      AIRFLOW_BASE_URL: ${{ vars.AIRFLOW_BASE_URL }}
      AIRFLOW_USERNAME: ${{ secrets.AIRFLOW_USERNAME }}
      AIRFLOW_PASSWORD: ${{ secrets.AIRFLOW_PASSWORD }}
      # ── MLflow ──
      MLFLOW_TRACKING_URI: ${{ vars.MLFLOW_TRACKING_URI }}
      # ── Redis ──
      REDIS_URL: ${{ secrets.REDIS_URL }}
      # ── Auth ──
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{ vars.ACCESS_TOKEN_EXPIRE_MINUTES }}
      ALGORITHM: ${{ vars.ALGORITHM }}
      ROOM_JWT_SECRET: ${{ secrets.ROOM_JWT_SECRET }}
      ROOM_JWT_EXPIRY_HOURS: "4"
      ROOM_CODE_EXPIRY_MINUTES: "60"
      # ── Model toggles ──
      USE_REAL_CLASSIFICATION: ${{ vars.USE_REAL_CLASSIFICATION }}
      USE_REAL_TRANSLATION: ${{ vars.USE_REAL_TRANSLATION }}
      USE_VERTEX_LEGAL_REVIEW: ${{ vars.USE_VERTEX_LEGAL_REVIEW }}
      USE_REAL_OCR: ${{ vars.USE_REAL_OCR }}
      USE_REAL_HANDWRITING_OCR: ${{ vars.USE_REAL_HANDWRITING_OCR }}
      USE_REAL_SPEECH: ${{ vars.USE_REAL_SPEECH }}
      # ── Model paths (empty — no weights in CI) ──
      NLLB_MODEL_PATH: ""
      WHISPER_MODEL_PATH: ""
      PIPER_TTS_ES_PATH: ""
      PIPER_TTS_PT_PATH: ""
      # ── Validation ──
      VALIDATION_CONFIDENCE_THRESHOLD: ${{ vars.VALIDATION_CONFIDENCE_THRESHOLD }}
      # ── Monitoring & Bias Thresholds ──
      BIAS_UNDERSERVED_THRESHOLD: "0.5"
      BIAS_TRANSLATION_COVERAGE_MIN: "20.0"
      BIAS_LANGUAGE_GAP_MAX: "30.0"
      # ── Model & Extraction Overrides ──
      OCR_CONFIDENCE_THRESHOLD: "0.35"
      TRANSLATION_HALLUCINATION_RATIO_MAX: "2.5"
      TRANSLATION_HALLUCINATION_RATIO_MIN: "0.1"
      # ── Anomaly Detection Thresholds ──
      ANOMALY_FORM_DROP_PCT: "20.0"
      ANOMALY_MASS_NEW_FORMS: "50"
      ANOMALY_DOWNLOAD_FAIL_PCT: "10.0"
      ANOMALY_MIN_PDF_SIZE_BYTES: "1024"
      ANOMALY_MAX_PDF_SIZE_BYTES: "52428800"
      ANOMALY_SCHEMA_ERRORS: "0"
      # ── Scraper Tuning ──
      SCRAPER_BATCH_SIZE: "10"
      SCRAPER_BATCH_SLEEP_SEC: "15"
      SCRAPER_PRE_DOWNLOAD_SLEEP: "60"
      SCRAPER_REQUEST_TIMEOUT: "30"
      # ── Processor Tuning ──
      PDF_RENDER_DPI: "300"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install uv
        run: pip install uv --quiet

      - name: Install package with dev + monitoring extras
        run: uv pip install --system ".[dev,monitoring]"

      - name: Install DVC with GCS support
        run: pip install "dvc[gs]" --quiet

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Fetch form catalog manifest from GCS
        # The catalog lives in GCS, written by task_write_manifest in form_scraper_dag.py.
        # WIF auth (step above) gives gsutil access without extra setup.
        # Fails hard — a missing manifest must block the deploy, not silently pass
        # bias/anomaly gates against an empty catalog.
        run: |
          MANIFEST_GCS="gs://${{ vars.GCS_BUCKET_FORMS }}/manifests/form_catalog_manifest.json"
          MANIFEST_LOCAL="/tmp/form_catalog_manifest.json"

          if gsutil cp "$MANIFEST_GCS" "$MANIFEST_LOCAL"; then
            echo "✅ Fetched manifest from $MANIFEST_GCS"
          else
            echo "❌ Could not fetch $MANIFEST_GCS — aborting deploy."
            exit 1
          fi

      - name: Check model DVC pointer sync
        # Runs dvc status on the models/ directory ONLY — not pipeline outputs.
        # Fails deployment if any model .dvc file is out of sync with the remote.
        # This catches: uncommitted dvc add, manually edited .dvc files, or a
        # model retrained without updating the pointer.
        run: |
          STATUS=$(dvc status models/ --json 2>/dev/null || echo "{}")

          if [ "$STATUS" = "{}" ] || [ "$STATUS" = "[]" ] || [ -z "$STATUS" ]; then
            echo "✅ All model .dvc files are in sync with the remote."
          else
            echo "❌ Model DVC state is out of sync — deployment blocked."
            echo ""
            echo "Fix: dvc add models/<model-dir> && dvc push && git add && git commit"
            echo ""
            echo "Changes detected:"
            echo "$STATUS"
            exit 1
          fi

      - name: Run bias detection gate
        run: |
          python - <<'EOF'
          import json
          import sys
          from pathlib import Path
          from courtaccess.monitoring.drift import run_bias_detection

          manifest = json.loads(Path("/tmp/form_catalog_manifest.json").read_text())
          catalog = manifest.get("forms", manifest) if isinstance(manifest, dict) else manifest
          print(f"Loaded catalog: {len(catalog)} entries")

          report = run_bias_detection(catalog)
          bias_flags = report.get("bias_flags", [])
          print(f"Bias flags: {len(bias_flags)}")

          critical = [f for f in bias_flags if f["severity"].lower() == "critical"]
          if critical:
              print(f"\n❌ {len(critical)} CRITICAL bias flag(s) — deployment blocked.")
              for f in critical:
                  print(f"  [{f['severity']}] {f['type']}: {f['detail']}")
              sys.exit(1)
          print("✅ No critical bias flags — deployment may proceed.")
          EOF

      - name: Register models in MLflow
        run: python -m courtaccess.core.register_models

      - name: Validate translation pipeline (pre-deploy gate)
        # Runs the fixed 20-phrase reference set against the pipeline.
        # Exits non-zero if nllb_avg_confidence < VALIDATION_CONFIDENCE_THRESHOLD.
        run: python -m courtaccess.core.validate_models

  # ════════════════════════════════════════════════════════════════════════════
  # Job 2 — deploy-to-vm
  #
  # SSHes into the GCE VM and runs scripts/deploy.sh, which pulls the new
  # GPU API + Airflow images from Artifact Registry and restarts the stack
  # via docker-compose.prod.yml. Saves the currently running image tags
  # before deploying so rollback-on-failure can restore them if smoke tests fail.
  # ════════════════════════════════════════════════════════════════════════════
  deploy-to-vm:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: validate-before-deploy

    # Expose pre-deploy image tags to downstream jobs for rollback
    outputs:
      rollback_api_image: ${{ steps.save-rollback.outputs.api_image }}
      rollback_airflow_image: ${{ steps.save-rollback.outputs.airflow_image }}

    steps:
      # ── Configure SSH ──────────────────────────────────────────────────────
      # VM_SSH_HOST and VM_SSH_USER are Variables (not sensitive).
      # VM_SSH_PRIVATE_KEY and VM_KNOWN_HOSTS are Secrets.
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          echo "${{ secrets.VM_KNOWN_HOSTS }}"     > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/deploy_key
          chmod 644 ~/.ssh/known_hosts

      # ── Save current running images for rollback ───────────────────────────
      # Queries the VM's Docker daemon for the image each service is currently
      # running. Falls back to "none" on first deploy (no containers yet).
      - name: Save current deployment for rollback
        id: save-rollback
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes ${{ vars.VM_SSH_USER }}@${{ vars.VM_SSH_HOST }}"

          API_IMG=$($SSH "docker ps --filter name=courtaccess-api --format '{{.Image}}' | head -1" 2>/dev/null || true)
          AIRFLOW_IMG=$($SSH "docker ps --filter name=courtaccess-airflow --format '{{.Image}}' | head -1" 2>/dev/null || true)

          echo "api_image=${API_IMG:-none}"         >> "$GITHUB_OUTPUT"
          echo "airflow_image=${AIRFLOW_IMG:-none}" >> "$GITHUB_OUTPUT"

          echo "Rollback references saved:"
          echo "  API:     ${API_IMG:-none}"
          echo "  Airflow: ${AIRFLOW_IMG:-none}"

      # ── Deploy ─────────────────────────────────────────────────────────────
      # deploy.sh handles: git reset to exact SHA, docker pull, ordered restart,
      # health check. The repo is cloned at ~/court-access-ai on the VM.
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.VM_SSH_HOST }}
          username: ${{ vars.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            bash ~/court-access-ai/scripts/deploy.sh "${{ github.sha }}"

  # ════════════════════════════════════════════════════════════════════════════
  # Job 3 — post-deploy-validation
  #
  # Smoke tests against the live VM endpoint. If any fails, the
  # rollback-on-failure job fires automatically.
  # ════════════════════════════════════════════════════════════════════════════
  post-deploy-validation:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-to-vm

    env:
      BASE_URL: "http://${{ vars.VM_EXTERNAL_IP }}:8000"

    steps:
      - name: Smoke test — GET /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${BASE_URL}/health" --max-time 15)

          if [ "$STATUS" -ne 200 ]; then
            echo "❌ /health returned HTTP ${STATUS} (expected 200)"
            exit 1
          fi
          echo "✅ /health → 200 OK"

      - name: Smoke test — GET /api/forms/
        run: |
          RESPONSE=$(curl -s "${BASE_URL}/api/forms/?page=1&page_size=1" \
            --max-time 15)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${BASE_URL}/api/forms/?page=1&page_size=1" --max-time 15)

          if [ "$STATUS" -ne 200 ]; then
            echo "❌ /api/forms/ returned HTTP ${STATUS} (expected 200)"
            exit 1
          fi

          TOTAL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('total', -1))")
          if [ "$TOTAL" -lt 0 ]; then
            echo "❌ /api/forms/ response missing 'total' field"
            echo "Response: ${RESPONSE:0:500}"
            exit 1
          fi
          echo "✅ /api/forms/ → 200 OK (total=${TOTAL})"

      # ── Success notification ─────────────────────────────────────────────
      - name: Notify successful deployment
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_EMAIL_FROM }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          subject: "✅ CourtAccess AI ${{ github.ref_name }} deployed successfully"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: "CourtAccess AI CI <${{ secrets.NOTIFY_EMAIL_FROM }}>"
          body: |
            CourtAccess AI has been deployed to production.

            Version : ${{ github.ref_name }}
            Commit  : ${{ github.sha }}
            Author  : ${{ github.actor }}

            Smoke tests passed:
              ✅ GET /health → 200
              ✅ GET /api/forms/ → 200

            View the deployment run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ════════════════════════════════════════════════════════════════════════════
  # Job 4 — rollback-on-failure
  #
  # Requirement 6 — Automated rollback. Fires only when post-deploy smoke
  # tests fail. Restores the previous image digest saved by deploy-to-vm.
  # ════════════════════════════════════════════════════════════════════════════
  rollback-on-failure:
    name: Rollback (automated)
    runs-on: ubuntu-latest
    needs: [deploy-to-vm, post-deploy-validation]
    if: failure()

    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.VM_SSH_HOST }}
          username: ${{ vars.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            API_IMAGE="${{ needs.deploy-to-vm.outputs.rollback_api_image }}"
            AIRFLOW_IMAGE="${{ needs.deploy-to-vm.outputs.rollback_airflow_image }}"

            cd ~/court-access-ai

            if [ "$API_IMAGE" = "none" ] || [ -z "$API_IMAGE" ]; then
              echo "⚠️  No previous API image to roll back to — skipping."
            else
              echo "Rolling back API to: ${API_IMAGE}"
              APP_VERSION="${API_IMAGE##*:}" \
                docker compose -f docker-compose.prod.yml --env-file .env.production \
                up -d --no-deps api
              echo "✅ API rolled back."
            fi

            if [ "$AIRFLOW_IMAGE" = "none" ] || [ -z "$AIRFLOW_IMAGE" ]; then
              echo "⚠️  No previous Airflow image to roll back to — skipping."
            else
              echo "Rolling back Airflow to: ${AIRFLOW_IMAGE}"
              APP_VERSION="${AIRFLOW_IMAGE##*:}" \
                docker compose -f docker-compose.prod.yml --env-file .env.production \
                up -d --no-deps \
                airflow-apiserver airflow-scheduler airflow-dag-processor airflow-triggerer
              echo "✅ Airflow rolled back."
            fi

      - name: Notify rollback
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_EMAIL_FROM }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          subject: "⚠️ CourtAccess AI ${{ github.ref_name }} ROLLED BACK"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: "CourtAccess AI CI <${{ secrets.NOTIFY_EMAIL_FROM }}>"
          body: |
            CourtAccess AI deployment was ROLLED BACK automatically.

            Version : ${{ github.ref_name }}
            Commit  : ${{ github.sha }}
            Author  : ${{ github.actor }}
            Reason  : Post-deploy smoke tests failed.

            Rolled back to:
              API:     ${{ needs.deploy-to-vm.outputs.rollback_api_image }}
              Airflow: ${{ needs.deploy-to-vm.outputs.rollback_airflow_image }}

            View the failed run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ACTION REQUIRED: Investigate the failure before attempting another deploy.
