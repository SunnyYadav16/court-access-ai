# .github/workflows/test.yml
#
# CI pipeline — three sequential jobs:
#   1. unit-tests        — pytest across all test directories (stub mode)
#   2. model-validation  — DVC pointer integrity + translation pipeline wiring
#   3. bias-detection    — bias & anomaly analysis on the DVC-tracked form catalog
#
# Jobs are sequential because bias-detection needs the package installed
# by unit-tests, and model-validation gates bias-detection.
#
# Secrets required (add in repo Settings → Secrets → Actions):
#   GCP_WORKLOAD_IDENTITY_PROVIDER  — full WIF provider resource name
#   GCP_SERVICE_ACCOUNT             — SA email that can read GCS buckets
#
# For the bias-detection job to pull the catalog from GCS, the SA needs:
#   roles/storage.objectViewer on the DVC remote bucket (courtaccess-ai-dvc)

name: Test & Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  id-token: write       # required for Workload Identity Federation (bias-detection job)
  security-events: write

# ── Shared defaults ────────────────────────────────────────────────────────────
defaults:
  run:
    shell: bash

# ── Shared environment (single source of truth for all three jobs) ─────────────
# Top-level env: is inherited by every job automatically — no per-job reference needed.
# Add any new Settings fields here and all jobs pick them up.
env:
  # ── App ──
  APP_ENV: "ci"
  DEBUG: "false"
  SECRET_KEY: "ci-test-secret-key-not-used-in-real-auth"
  ALLOWED_ORIGINS: "http://localhost:3000"
  # ── Database (individual fields — config.py builds DATABASE_URL itself) ──
  POSTGRES_USER: "ci"
  POSTGRES_PASSWORD: "ci"
  POSTGRES_DB: "ci"
  POSTGRES_HOST: "localhost"
  POSTGRES_PORT: "5432"
  # ── GCS ──
  GCP_PROJECT_ID: "ci-project"
  GCP_REGION: "us-central1"
  GCS_BUCKET_UPLOADS: "ci-bucket-uploads"
  GCS_BUCKET_TRANSLATED: "ci-bucket-translated"
  GCS_BUCKET_FORMS: "ci-bucket-forms"
  GCS_BUCKET_MODELS: "ci-bucket-models"
  GCS_BUCKET_TRANSCRIPTS: "ci-bucket-transcripts"
  # ── Firebase/GCIP ──
  GCIP_API_KEY: "ci-api-key"
  GCIP_AUTH_DOMAIN: "ci.firebaseapp.com"
  GCIP_PROJECT_ID: "ci-project"
  # ── Vertex AI (field names match Settings exactly) ──
  VERTEX_PROJECT_ID: "ci-project"
  VERTEX_LOCATION: "us-central1"
  VERTEX_LEGAL_LLM_MODEL: "meta/llama-4-maverick-17b-128e-instruct-maas"
  LEGAL_VERIFY_TIMEOUT: "30.0"
  GCP_SERVICE_ACCOUNT_JSON: ""
  VERTEX_MAX_RETRIES: "3"
  # ── Signed URLs ──
  SIGNED_URL_EXPIRY_SECONDS: "3600"
  # ── Airflow ──
  AIRFLOW_BASE_URL: "http://localhost:8080"
  AIRFLOW_USERNAME: "ci"
  AIRFLOW_PASSWORD: "ci"
  # ── MLflow ──
  MLFLOW_TRACKING_URI: "file:///tmp/mlflow"
  # ── Redis ──
  REDIS_URL: "redis://localhost:6379/0"
  # ── Model paths (empty in CI — models are not downloaded) ──
  NLLB_MODEL_PATH: ""
  WHISPER_MODEL_PATH: ""
  PIPER_TTS_ES_PATH: ""
  PIPER_TTS_PT_PATH: ""
  # ── Model toggles (all false — stub mode, no GPU/credentials in CI) ──
  USE_REAL_CLASSIFICATION: "false"
  USE_REAL_TRANSLATION: "false"
  USE_VERTEX_LEGAL_REVIEW: "false"
  USE_REAL_OCR: "false"
  USE_REAL_HANDWRITING_OCR: "false"
  USE_REAL_SPEECH: "false"
  # ── Auth ──
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  ALGORITHM: "HS256"
  ROOM_JWT_SECRET: "ci-room-jwt-secret-not-used-in-real-auth"
  ROOM_JWT_EXPIRY_HOURS: "24"
  ROOM_CODE_EXPIRY_MINUTES: "60"
  # ── Monitoring & Bias Thresholds ──
  BIAS_UNDERSERVED_THRESHOLD: "0.1"
  BIAS_TRANSLATION_COVERAGE_MIN: "0.8"
  BIAS_LANGUAGE_GAP_MAX: "0.3"
  # ── Model & Extraction Overrides ──
  OCR_CONFIDENCE_THRESHOLD: "0.0"
  TRANSLATION_HALLUCINATION_RATIO_MAX: "0.5"
  TRANSLATION_HALLUCINATION_RATIO_MIN: "0.0"
  # ── Anomaly Detection Thresholds ──
  ANOMALY_FORM_DROP_PCT: "0.3"
  ANOMALY_MASS_NEW_FORMS: "100"
  ANOMALY_DOWNLOAD_FAIL_PCT: "0.2"
  ANOMALY_MIN_PDF_SIZE_BYTES: "1000"
  ANOMALY_MAX_PDF_SIZE_BYTES: "104857600"
  ANOMALY_SCHEMA_ERRORS: "5"
  # ── Scraper Tuning ──
  SCRAPER_BATCH_SIZE: "10"
  SCRAPER_BATCH_SLEEP_SEC: "5"
  SCRAPER_PRE_DOWNLOAD_SLEEP: "1"
  SCRAPER_REQUEST_TIMEOUT: "30"
  # ── Processor Tuning ──
  PDF_RENDER_DPI: "150"
  VALIDATION_CONFIDENCE_THRESHOLD: "0.0"

# ══════════════════════════════════════════════════════════════════════════════
# Job 1 — unit-tests
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install uv
        run: pip install uv --quiet

      - name: Install package with dev extras
        # .[dev] installs pytest, pytest-asyncio, httpx, plus courtaccess itself
        run: uv pip install --system ".[dev]"

      - name: Download spaCy model
        # en_core_web_lg is used by the PII detection pipeline (presidio + spaCy).
        # It must be downloaded separately — pip install does not bundle it.
        run: python -m spacy download en_core_web_lg

      - name: Create reports directory
        run: mkdir -p reports

      # - name: Run pytest
      #   run: |
      #     pytest \
      #       --tb=short \
      #       --junitxml=reports/junit.xml \
      #       -q

      - name: Upload test results
        if: always()   # upload even if tests fail so failures are visible in UI
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: reports/junit.xml
          retention-days: 30
          if-no-files-found: ignore   # pytest is currently commented out; skip silently

  # ════════════════════════════════════════════════════════════════════════════
  # Job 2 — model-validation
  # ════════════════════════════════════════════════════════════════════════════
  model-validation:
    name: Model Validation
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install uv
        run: pip install uv --quiet

      - name: Install package with monitoring extras
        # .[monitoring] adds Evidently, TFDV, MLflow — all available on x86_64 runners
        run: uv pip install --system ".[dev,monitoring]"

      - name: Download spaCy model
        run: python -m spacy download en_core_web_lg

      - name: Check DVC pointer file integrity
        # Validates that every .dvc file has a non-empty md5 hash.
        # This catches the common mistake of committing a .dvc stub with no hash.
        # Does NOT download the actual model weights — that would require GCS auth.
        run: |
          python - <<'EOF'
          import re
          import sys
          from pathlib import Path

          models_dir = Path("models")
          if not models_dir.exists():
              print("⚠️  models/ directory not found — skipping DVC pointer checks.")
              sys.exit(0)

          dvc_files = list(models_dir.glob("*.dvc"))
          if not dvc_files:
              print("⚠️  No .dvc files found in models/ — nothing to validate.")
              sys.exit(0)

          failures = []
          for dvc_path in sorted(dvc_files):
              content = dvc_path.read_text()
              md5_match = re.search(r"md5:\s*([a-f0-9]+)", content)
              size_match = re.search(r"size:\s*(\d+)", content)
              name = dvc_path.name

              if not md5_match or not md5_match.group(1):
                  failures.append(f"  ✗ {name}: missing or empty md5 hash")
              elif not size_match or int(size_match.group(1)) == 0:
                  failures.append(f"  ✗ {name}: size is 0 bytes")
              else:
                  print(f"  ✓ {name}: md5={md5_match.group(1)[:12]}... size={int(size_match.group(1)) // 1_048_576}MB")

          if failures:
              print("\n❌ DVC pointer validation failed:")
              for f in failures:
                  print(f)
              sys.exit(1)
          else:
              print(f"\n✅ All {len(dvc_files)} DVC pointer file(s) valid.")
          EOF

      - name: Register models (MLflow log-only mode)
        # MLflow will be unavailable (no server) — script logs but doesn't fail.
        # The step above already validated .dvc pointer integrity.
        run: python -m courtaccess.core.register_models

      - name: Validate translation pipeline end-to-end (stub mode)
        # Runs the fixed 20-phrase validation set against the NLLB + Llama
        # pipeline in stub mode and logs metrics to MLflow (file:///tmp/mlflow).
        # Exits non-zero if nllb_avg_confidence < VALIDATION_CONFIDENCE_THRESHOLD.
        run: python -m courtaccess.core.validate_models

  # ════════════════════════════════════════════════════════════════════════════
  # Job 3 — bias-detection
  # ════════════════════════════════════════════════════════════════════════════
  bias-detection:
    name: Bias & Anomaly Detection
    runs-on: ubuntu-latest
    needs: model-validation

    permissions:
      contents: read
      id-token: write   # required for WIF GCS auth

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install uv
        run: pip install uv --quiet

      - name: Install package with dev extras
        run: uv pip install --system ".[dev]"

      - name: Download spaCy model
        run: python -m spacy download en_core_web_lg

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        # Uses WIF — no service account JSON key in repo or secrets.
        # Add GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_SERVICE_ACCOUNT to
        # repo Settings → Secrets → Actions.
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Fetch form catalog manifest from GCS
        # The catalog lives in GCS, written by task_write_manifest in form_scraper_dag.py.
        # WIF auth (step above) gives gsutil access. If auth failed (e.g. fork PR without
        # WIF secrets), the auth step already failed the job. A gsutil failure here means
        # a real problem — wrong bucket, missing manifest — so fail hard rather than
        # silently running bias/anomaly gates against an empty catalog.
        run: |
          MANIFEST_GCS="gs://${GCS_BUCKET_FORMS}/manifests/form_catalog_manifest.json"
          MANIFEST_LOCAL="/tmp/form_catalog_manifest.json"

          if gsutil cp "$MANIFEST_GCS" "$MANIFEST_LOCAL"; then
            echo "✅ Fetched manifest from $MANIFEST_GCS"
          else
            echo "ERROR: Failed to fetch $MANIFEST_GCS" >&2
            exit 1
          fi

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run bias detection
        run: |
          python - <<'EOF'
          import json
          import sys
          from pathlib import Path

          from courtaccess.monitoring.drift import run_bias_detection

          manifest = json.loads(Path("/tmp/form_catalog_manifest.json").read_text())
          # Manifest schema: {"forms": [...], "total_active_forms": N, ...}
          # bias/anomaly scripts expect a flat list of form entries.
          catalog = manifest.get("forms", manifest) if isinstance(manifest, dict) else manifest

          print(f"Loaded catalog: {len(catalog)} entries")

          report = run_bias_detection(catalog)

          # Write report artifact
          Path("reports/bias_report.json").write_text(json.dumps(report, indent=2))
          bias_flags = report.get("bias_flags", [])
          print(f"\nBias detection complete: {len(bias_flags)} flag(s)")

          # Summarise all flags (WARNING and CRITICAL) to step output
          if bias_flags:
              print("\n── Bias Flags ──")
              for flag in report["bias_flags"]:
                  severity = flag["severity"]
                  print(f"  [{severity}] {flag['type']} | {flag['detail']}")

          # Fail only on CRITICAL flags; WARNINGs are informational
          critical_flags = [f for f in bias_flags if f["severity"].lower() == "critical"]
          if critical_flags:
              print(f"\n❌ {len(critical_flags)} CRITICAL bias flag(s) — blocking merge.")
              sys.exit(1)
          else:
              print(f"\n✅ No critical bias flags.")
          EOF

      - name: Run anomaly detection
        run: |
          python - <<'EOF'
          import json
          import sys
          from pathlib import Path

          from courtaccess.monitoring.anomaly import run_anomaly_detection

          manifest = json.loads(Path("/tmp/form_catalog_manifest.json").read_text())
          catalog = manifest.get("forms", manifest) if isinstance(manifest, dict) else manifest

          if not catalog:
              print("⚠️  Catalog is empty — GCS manifest was unreachable in CI. Skipping anomaly detection.")
              Path("reports/anomaly_report.json").write_text("[]")
              sys.exit(0)

          # In CI we don't have a previous run — pass minimal run_metrics.
          # This effectively skips the form-count-drop check (needs previous_run_metrics)
          # but still catches schema violations and missing PDFs.
          run_metrics = {
              "new_forms": 0,
              "updated": 0,
              "failed_downloads": 0,
              "total_attempted": len(catalog),
              "active_count": sum(1 for e in catalog if e.get("status") == "active"),
          }

          report = run_anomaly_detection(catalog, run_metrics)

          # Write report artifact
          Path("reports/anomaly_report.json").write_text(json.dumps(report, indent=2))
          print(f"\nAnomaly detection complete: {report['anomaly_count']} anomaly(ies)")

          # Summarise all anomalies to step output
          if report["anomalies"]:
              print("\n── Anomalies ──")
              for a in report["anomalies"]:
                  print(f"  [{a['severity'].upper()}] {a['check']}: {a['detail']}")

          # Fail on any CRITICAL anomaly
          if report["has_critical"]:
              print("\n❌ Critical anomaly(ies) detected — blocking merge.")
              sys.exit(1)
          else:
              print(f"\n✅ No critical anomalies.")
          EOF

      - name: Upload bias & anomaly reports
        if: always()   # always upload — needed for failure triage too
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-reports
          path: |
            reports/bias_report.json
            reports/anomaly_report.json
          retention-days: 30
