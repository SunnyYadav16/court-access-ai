# .github/workflows/build.yml
#
# Requirement 4 — Push to artifact registry (Docker images)
# Requirement 5 — Failure notification (email via dawidd6/action-send-mail)
#
# Triggers only on push to main — no reason to build images on feature branches.
#
# Builds two targets from the multi-stage Dockerfile:
#   api     — FastAPI app server (serves frontend static files + REST API)
#   airflow — Airflow scheduler/workers with courtaccess package pre-installed
#
# Images are pushed to Google Artifact Registry:
#   {GCP_ARTIFACT_REGISTRY}/{GCP_PROJECT_ID}/{GCP_ARTIFACT_REPOSITORY}/courtaccess-api:{sha}
#   {GCP_ARTIFACT_REGISTRY}/{GCP_PROJECT_ID}/{GCP_ARTIFACT_REPOSITORY}/courtaccess-airflow:{sha}
#
# Required GitHub Actions repository variables (Settings → Variables → Actions):
#   GCP_PROJECT_ID           — GCP project ID (non-sensitive, use vars not secrets)
#   GCP_ARTIFACT_REGISTRY    — Registry location (e.g., us-east1-docker.pkg.dev)
#   GCP_ARTIFACT_REPOSITORY  — Repository name (e.g., courtaccess-repo)
#
# Required GitHub Actions secrets (Settings → Secrets → Actions):
#   GCP_WORKLOAD_IDENTITY_PROVIDER — full WIF provider resource name
#   GCP_SERVICE_ACCOUNT            — SA email with Artifact Registry writer role
#   NOTIFY_EMAIL_FROM              — sender address (e.g. ci@courtaccess.ai)
#   NOTIFY_EMAIL_TO                — recipient(s) for failure alerts
#   NOTIFY_EMAIL_PASSWORD          — SMTP password for the sender account
#
# Artifact Registry setup (one-time):
#   gcloud artifacts repositories create $GCP_ARTIFACT_REPOSITORY \
#     --repository-format=docker --location=us-east1
#   gcloud projects add-iam-policy-binding $GCP_PROJECT_ID \
#     --member="serviceAccount:${GCP_SERVICE_ACCOUNT}" \
#     --role="roles/artifactregistry.writer"

name: Build & Push Images

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

# Cancel in-progress builds on the same ref to avoid wasted runner time
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  REGISTRY: ${{ vars.GCP_ARTIFACT_REGISTRY }}
  REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY }}
  API_CPU_IMAGE: courtaccess-api-cpu
  API_GPU_IMAGE: courtaccess-api-gpu
  AIRFLOW_IMAGE: courtaccess-airflow

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Authenticate to GCP (Workload Identity Federation) ────────────────
      # No long-lived SA JSON key — uses OIDC token exchange.
      # SA needs: roles/artifactregistry.writer on the registry.
      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── 3. Set up gcloud CLI ─────────────────────────────────────────────────
      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # ── 4. Configure Docker credential helper for Artifact Registry ──────────
      # Allows `docker push` to authenticate via the gcloud token.
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── 5. Set up Docker Buildx (enables layer caching) ──────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 6. Compute image tags ────────────────────────────────────────────────
      # Full SHA for immutable image reference — matches what deploy.yml uses.
      # deploy.yml reads reports/image-digest.txt to know which exact image to deploy.
      - name: Compute image tags
        id: tags
        run: |
          PROJECT_ID="${{ vars.GCP_PROJECT_ID }}"
          BASE="${{ env.REGISTRY }}/${PROJECT_ID}/${{ env.REPOSITORY }}"
          echo "api_cpu_tag=${BASE}/${{ env.API_CPU_IMAGE }}:${{ github.sha }}"         >> "$GITHUB_OUTPUT"
          echo "api_cpu_latest=${BASE}/${{ env.API_CPU_IMAGE }}:latest"             >> "$GITHUB_OUTPUT"
          echo "api_gpu_tag=${BASE}/${{ env.API_GPU_IMAGE }}:${{ github.sha }}"         >> "$GITHUB_OUTPUT"
          echo "api_gpu_latest=${BASE}/${{ env.API_GPU_IMAGE }}:latest"             >> "$GITHUB_OUTPUT"
          echo "airflow_tag=${BASE}/${{ env.AIRFLOW_IMAGE }}:${{ github.sha }}"     >> "$GITHUB_OUTPUT"
          echo "airflow_latest=${BASE}/${{ env.AIRFLOW_IMAGE }}:latest"             >> "$GITHUB_OUTPUT"

      # ── 7. Build & push — api-cpu target ────────────────────────────────────
      # CPU-only image for local dev (no GPU required). Uses the multi-stage Dockerfile.
      # Cache: GitHub Actions cache backend keeps layer cache across runs.
      - name: Build & push api-cpu image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: api
          push: true
          tags: |
            ${{ steps.tags.outputs.api_cpu_tag }}
            ${{ steps.tags.outputs.api_cpu_latest }}
          # VITE_* vars are baked into the React bundle at build time and cannot
          # be injected at runtime. Sensitive values come from Secrets; public
          # config (project IDs, domains) come from Variables.
          build-args: |
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ vars.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET=${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          provenance: false   # disable SLSA provenance (not needed for this registry)

      # ── 8. Build & push — api-gpu target ────────────────────────────────────
      # gpu.Dockerfile — used exclusively by docker-compose.prod.yml.
      # Same VITE_* build args as the CPU image (ARGs are declared in gpu.Dockerfile).
      - name: Build & push api-gpu image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: gpu.Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.api_gpu_tag }}
            ${{ steps.tags.outputs.api_gpu_latest }}
          build-args: |
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ vars.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET=${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          cache-from: type=gha,scope=api-gpu
          cache-to: type=gha,mode=max,scope=api-gpu
          provenance: false

      # ── 10. Build & push — airflow target ────────────────────────────────────
      # apache/airflow:3.1.7 base + courtaccess package + DAGs + Playwright/Chromium
      - name: Build & push airflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: airflow
          push: true
          tags: |
            ${{ steps.tags.outputs.airflow_tag }}
            ${{ steps.tags.outputs.airflow_latest }}
          cache-from: type=gha,scope=airflow
          cache-to: type=gha,mode=max,scope=airflow
          provenance: false

      # ── 11. Write image digest report ────────────────────────────────────────
      # deploy.yml reads this file to know exactly which SHA to deploy.
      # Keeps deployments reproducible — no implicit :latest tag chasing.
      - name: Write image digest report
        run: |
          mkdir -p reports
          cat > reports/image-digest.txt <<EOF
          build_sha:       ${{ github.sha }}
          actor:           ${{ github.actor }}
          timestamp:       $(date -u +"%Y-%m-%dT%H:%M:%SZ")

          api_cpu_image:   ${{ steps.tags.outputs.api_cpu_tag }}
          api_gpu_image:   ${{ steps.tags.outputs.api_gpu_tag }}
          airflow_image:   ${{ steps.tags.outputs.airflow_tag }}
          EOF
          echo "── Image digest report ──"
          cat reports/image-digest.txt

      - name: Upload image digest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest
          path: reports/image-digest.txt
          retention-days: 90   # keep long enough to trace any deployed version

      # ── 12. Notify on build failure (email) ──────────────────────────────────
      # Requirement 5 — only fires when a previous step in this job failed.
      # Requires 4 secrets: NOTIFY_EMAIL_FROM, NOTIFY_EMAIL_TO,
      #                     NOTIFY_EMAIL_PASSWORD (SMTP app password),
      #                     and an SMTP server (defaults to Gmail below).
      # To change provider set server_address + server_port below.
      - name: Notify on build failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_EMAIL_FROM }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          subject: "❌ CourtAccess AI build failed on main"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: "CourtAccess AI CI <${{ secrets.NOTIFY_EMAIL_FROM }}>"
          body: |
            A Docker image build failed on the main branch.

            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}
            Message: ${{ github.event.head_commit.message }}

            View the failed run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Fix the issue and push a new commit to main to re-trigger the build.
