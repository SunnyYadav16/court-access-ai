# ══════════════════════════════════════════════════════════════════════════════
# docker-compose.prod.yml — CourtAccess AI (production VM)
#
# Differences from docker-compose.yml (local dev):
#   - No local postgres container — uses Cloud SQL directly via POSTGRES_HOST
#   - No live code volume mounts — code is baked into the Docker image
#   - No .git / .dvc / .config volume mounts — no local credentials needed
#   - VM's attached service account handles all GCP auth (ADC)
#   - GOOGLE_APPLICATION_CREDENTIALS and GCP_DVC_CREDENTIALS are empty
#   - _PIP_ADDITIONAL_REQUIREMENTS removed (use Dockerfile for prod deps)
#   - Redis port not exposed publicly
#   - Named volumes for logs, data, forms, models (no host bind mounts)
#   - dags/ is still a bind mount so DAGs can be updated via git pull
#     without rebuilding the image
#
# Run with:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
# ══════════════════════════════════════════════════════════════════════════════

x-airflow-common:
  &airflow-common
  image: ${ARTIFACT_REGISTRY}/courtaccess-airflow:${APP_VERSION:-latest}
  environment:
    &airflow-common-env
    # ── Core ──
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${AIRFLOW_SECRET_KEY}

    # ── Auth ──
    AIRFLOW__CORE__AUTH_MANAGER: airflow.auth.managers.simple.simple_auth_manager.SimpleAuthManager
    AIRFLOW__SIMPLE_AUTH_MANAGER__PASSWORDS: '{"airflow": "airflow"}'
    AIRFLOW__SIMPLE_AUTH_MANAGER__ROLE: 'Admin'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_SECRET_KEY}

    # ── Database (Cloud SQL) ──
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${AIRFLOW_DB}

    # ── Scheduler ──
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Heartbeat grace — long-running PDF translation tasks (OCR + NLLB + legal
    # review) can take 10+ minutes per form.  The default scheduler heartbeat
    # timeout is too short, causing httpx.ReadTimeout between the scheduler and
    # the internal API server.  These settings prevent the scheduler from
    # killing healthy-but-slow tasks.
    AIRFLOW__SCHEDULER__SCHEDULER_HEARTBEAT_SEC: '30'
    AIRFLOW__SCHEDULER__LOCAL_TASK_JOB_HEARTBEAT_SEC: '30'

    # ── Task execution ──
    # Increase the internal API timeout so task start / heartbeat RPCs don't
    # time out under load (default is 30s which is too tight for a VM running
    # heavy ML workloads alongside the Airflow API server).
    AIRFLOW__CORE__INTERNAL_API_TIMEOUT: '120'
    # Cap concurrent tasks — LocalExecutor on a single VM with GPU-heavy
    # translation should not run 32 tasks (the default) in parallel.
    AIRFLOW__CORE__PARALLELISM: '8'
    AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: '4'

    # ── courtaccess package path ──
    PYTHONPATH: /opt/airflow

    # ── Git/DVC ──
    GIT_DISCOVERY_ACROSS_FILESYSTEM: '1'

    # ── Redis ──
    REDIS_URL: ${REDIS_URL}

    # ── MLflow ──
    MLFLOW_TRACKING_URI: http://mlflow:5000

    # ── Application ──
    APP_ENV: ${APP_ENV}

    # ── Database URL ──
    DATABASE_URL: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}"

    # ── Google Cloud / GCS ──
    GCP_SERVICE_ACCOUNT_JSON: ${GCP_SERVICE_ACCOUNT_JSON}
    GCS_BUCKET_UPLOADS: ${GCS_BUCKET_UPLOADS}
    GCS_BUCKET_TRANSLATED: ${GCS_BUCKET_TRANSLATED}
    GCS_BUCKET_FORMS: ${GCS_BUCKET_FORMS}
    GCS_BUCKET_MODELS: ${GCS_BUCKET_MODELS}
    GCS_BUCKET_TRANSCRIPTS: ${GCS_BUCKET_TRANSCRIPTS}
    SIGNED_URL_EXPIRY_SECONDS: ${SIGNED_URL_EXPIRY_SECONDS}

    # ── Vertex AI ──
    VERTEX_PROJECT_ID: ${VERTEX_PROJECT_ID}
    VERTEX_LOCATION: ${VERTEX_LOCATION}
    VERTEX_LEGAL_LLM_MODEL: ${VERTEX_LEGAL_LLM_MODEL}
    LEGAL_VERIFY_TIMEOUT: ${LEGAL_VERIFY_TIMEOUT}

    # ── Feature flags ──
    USE_REAL_CLASSIFICATION: ${USE_REAL_CLASSIFICATION}
    USE_REAL_TRANSLATION: ${USE_REAL_TRANSLATION}
    USE_VERTEX_LEGAL_REVIEW: ${USE_VERTEX_LEGAL_REVIEW}
    USE_REAL_OCR: ${USE_REAL_OCR}
    USE_REAL_HANDWRITING_OCR: ${USE_REAL_HANDWRITING_OCR}

    # ── Model Paths (inside container) ──
    NLLB_MODEL_PATH: ${NLLB_MODEL_PATH}
    WHISPER_MODEL_PATH: ${WHISPER_MODEL_PATH}
    PIPER_TTS_ES_PATH: ${PIPER_TTS_ES_PATH}
    PIPER_TTS_PT_PATH: ${PIPER_TTS_PT_PATH}
    PIPER_TTS_EN_PATH: ${PIPER_TTS_EN_PATH}
    SILERO_VAD_MODEL_PATH: ${SILERO_VAD_MODEL_PATH}

    # ── Real-Time Speech Pipeline ──
    USE_REAL_SPEECH: ${USE_REAL_SPEECH}
    WHISPER_MODEL: ${WHISPER_MODEL}
    NLLB_MODEL: ${NLLB_MODEL}
    VAD_SPEECH_THRESHOLD: ${VAD_SPEECH_THRESHOLD}
    PIPER_VOICES_DIR: ${PIPER_VOICES_DIR}
    SESSION_RECORDINGS_DIR: ${SESSION_RECORDINGS_DIR}
    TURN_GRACE_A_MS: ${TURN_GRACE_A_MS}
    TURN_GRACE_B_MS: ${TURN_GRACE_B_MS}
    TTS_LOCKOUT_BUFFER_MS: ${TTS_LOCKOUT_BUFFER_MS}

    # ── Monitoring & Bias Thresholds ──
    BIAS_UNDERSERVED_THRESHOLD: ${BIAS_UNDERSERVED_THRESHOLD}
    BIAS_TRANSLATION_COVERAGE_MIN: ${BIAS_TRANSLATION_COVERAGE_MIN}
    BIAS_LANGUAGE_GAP_MAX: ${BIAS_LANGUAGE_GAP_MAX}

    # ── Model & Extraction Overrides ──
    OCR_CONFIDENCE_THRESHOLD: ${OCR_CONFIDENCE_THRESHOLD}
    VERTEX_MAX_RETRIES: ${VERTEX_MAX_RETRIES}
    TRANSLATION_HALLUCINATION_RATIO_MAX: ${TRANSLATION_HALLUCINATION_RATIO_MAX}
    TRANSLATION_HALLUCINATION_RATIO_MIN: ${TRANSLATION_HALLUCINATION_RATIO_MIN}

    # ── Anomaly Detection Thresholds ──
    ANOMALY_FORM_DROP_PCT: ${ANOMALY_FORM_DROP_PCT}
    ANOMALY_MASS_NEW_FORMS: ${ANOMALY_MASS_NEW_FORMS}
    ANOMALY_DOWNLOAD_FAIL_PCT: ${ANOMALY_DOWNLOAD_FAIL_PCT}
    ANOMALY_MIN_PDF_SIZE_BYTES: ${ANOMALY_MIN_PDF_SIZE_BYTES}
    ANOMALY_MAX_PDF_SIZE_BYTES: ${ANOMALY_MAX_PDF_SIZE_BYTES}
    ANOMALY_SCHEMA_ERRORS: ${ANOMALY_SCHEMA_ERRORS}

    # ── Scraper Tuning ──
    SCRAPER_BATCH_SIZE: ${SCRAPER_BATCH_SIZE}
    SCRAPER_BATCH_SLEEP_SEC: ${SCRAPER_BATCH_SLEEP_SEC}
    SCRAPER_PRE_DOWNLOAD_SLEEP: ${SCRAPER_PRE_DOWNLOAD_SLEEP}
    SCRAPER_REQUEST_TIMEOUT: ${SCRAPER_REQUEST_TIMEOUT}

    # ── Processor Tuning ──
    PDF_RENDER_DPI: ${PDF_RENDER_DPI}
    VALIDATION_CONFIDENCE_THRESHOLD: ${VALIDATION_CONFIDENCE_THRESHOLD}

    # ── GCP credentials ──
    # Empty in prod — VM's attached service account handles auth via ADC.
    # No key files needed.
    GOOGLE_APPLICATION_CREDENTIALS: ''
    GCP_DVC_CREDENTIALS: ''

    GROQ_API_KEY: ${GROQ_API_KEY}
    GROQ_LEGAL_LLM_MODEL: ${GROQ_LEGAL_LLM_MODEL}


  env_file:
    - .env.production

  volumes:
    &airflow-common-volumes
    # dags/ is a bind mount so DAG updates via git pull take effect
    # without rebuilding the image.
    - ./dags:/opt/airflow/dags
    # Named volumes — no host bind mounts in prod
    - airflow-logs:/opt/airflow/logs
    - airflow-data:/opt/airflow/data
    - airflow-forms:/opt/airflow/forms
    - shared-models:/opt/airflow/models

  # ── GPU Configuration ──
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  # Port NOT exposed in prod — only accessible within the Docker network.
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # ── MLflow Tracking Server ─────────────────────────────────────────────────
  # NOTE: The mlflow database on Cloud SQL must be created once manually before
  # the first deploy — Cloud SQL ignores docker-entrypoint-initdb.d/:
  #   psql -h ${POSTGRES_HOST} -U ${POSTGRES_USER} -c "CREATE DATABASE mlflow;"
  # No depends_on for postgres — Cloud SQL is external to this Compose stack.
  # api and Airflow services do NOT hard-depend on this service; all callers
  # handle MLflow unavailability gracefully.
  mlflow:
    build:
      context: .
      dockerfile: mlflow.Dockerfile
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/mlflow
      --artifacts-destination gs://${GCS_BUCKET_MODELS}/mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
      --allowed-hosts "*"
      --cors-allowed-origins "*"
    ports:
      - "5050:5000"
    # GCS auth — VM's attached service account handles auth via ADC.
    # No GOOGLE_APPLICATION_CREDENTIALS needed; its absence lets the
    # google-cloud-storage SDK discover credentials automatically.
    volumes:
      - mlflow-state:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Nginx (reverse proxy) ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  # ── FastAPI ────────────────────────────────────────────────────────────────
  api:
    # VITE_* vars are baked into the bundle by build.yml at image build time —
    # they cannot be injected here at runtime.
    image: ${ARTIFACT_REGISTRY}/courtaccess-api-gpu:${APP_VERSION:-latest}
    environment:
      # ── Application ──
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SIGNED_URL_EXPIRY_SECONDS: ${SIGNED_URL_EXPIRY_SECONDS}
      # ── Database (Cloud SQL) ──
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      # ── Google Cloud ──
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_REGION: ${GCP_REGION}
      GCS_BUCKET_UPLOADS: ${GCS_BUCKET_UPLOADS}
      GCS_BUCKET_TRANSLATED: ${GCS_BUCKET_TRANSLATED}
      GCS_BUCKET_FORMS: ${GCS_BUCKET_FORMS}
      GCS_BUCKET_MODELS: ${GCS_BUCKET_MODELS}
      GCS_BUCKET_TRANSCRIPTS: ${GCS_BUCKET_TRANSCRIPTS}
      GCP_SERVICE_ACCOUNT_JSON: ''
      # ── Auth (GCIP / Firebase) ──
      GCIP_API_KEY: ${GCIP_API_KEY}
      GCIP_AUTH_DOMAIN: ${GCIP_AUTH_DOMAIN}
      GCIP_PROJECT_ID: ${GCIP_PROJECT_ID}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      ALGORITHM: ${ALGORITHM}
      ROOM_JWT_SECRET: ${ROOM_JWT_SECRET}
      ROOM_JWT_EXPIRY_HOURS: ${ROOM_JWT_EXPIRY_HOURS}
      ROOM_CODE_EXPIRY_MINUTES: ${ROOM_CODE_EXPIRY_MINUTES}
      # ── Vertex AI ──
      VERTEX_PROJECT_ID: ${VERTEX_PROJECT_ID}
      VERTEX_LOCATION: ${VERTEX_LOCATION}
      VERTEX_LEGAL_LLM_MODEL: ${VERTEX_LEGAL_LLM_MODEL}
      LEGAL_VERIFY_TIMEOUT: ${LEGAL_VERIFY_TIMEOUT}
      # ── Redis & MLflow ──
      REDIS_URL: ${REDIS_URL}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # ── Feature Flags & Model Paths ──
      USE_REAL_CLASSIFICATION: ${USE_REAL_CLASSIFICATION}
      USE_REAL_TRANSLATION: ${USE_REAL_TRANSLATION}
      USE_VERTEX_LEGAL_REVIEW: ${USE_VERTEX_LEGAL_REVIEW}
      USE_REAL_OCR: ${USE_REAL_OCR}
      USE_REAL_HANDWRITING_OCR: ${USE_REAL_HANDWRITING_OCR}
      NLLB_MODEL_PATH: /app/models/nllb-200-distilled-1.3B-ct2
      WHISPER_MODEL_PATH: /app/models/whisper-large-v3
      PIPER_TTS_ES_PATH: /app/models/piper-tts-es
      PIPER_TTS_PT_PATH: /app/models/piper-tts-pt
      PIPER_TTS_EN_PATH: /app/models/piper-tts-en
      SILERO_VAD_MODEL_PATH: /app/models/silero-vad-v4/silero_vad.jit.pt
      # ── Real-Time Speech Pipeline ──
      USE_REAL_SPEECH: ${USE_REAL_SPEECH}
      WHISPER_MODEL: ${WHISPER_MODEL}
      NLLB_MODEL: ${NLLB_MODEL}
      VAD_SPEECH_THRESHOLD: ${VAD_SPEECH_THRESHOLD}
      PIPER_VOICES_DIR: ${PIPER_VOICES_DIR}
      SESSION_RECORDINGS_DIR: ${SESSION_RECORDINGS_DIR}
      TURN_GRACE_A_MS: ${TURN_GRACE_A_MS}
      TURN_GRACE_B_MS: ${TURN_GRACE_B_MS}
      TTS_LOCKOUT_BUFFER_MS: ${TTS_LOCKOUT_BUFFER_MS}
      # ── Monitoring & Bias Thresholds ──
      BIAS_UNDERSERVED_THRESHOLD: ${BIAS_UNDERSERVED_THRESHOLD}
      BIAS_TRANSLATION_COVERAGE_MIN: ${BIAS_TRANSLATION_COVERAGE_MIN}
      BIAS_LANGUAGE_GAP_MAX: ${BIAS_LANGUAGE_GAP_MAX}
      # ── Model & Extraction Overrides ──
      OCR_CONFIDENCE_THRESHOLD: ${OCR_CONFIDENCE_THRESHOLD}
      VERTEX_MAX_RETRIES: ${VERTEX_MAX_RETRIES}
      TRANSLATION_HALLUCINATION_RATIO_MAX: ${TRANSLATION_HALLUCINATION_RATIO_MAX}
      TRANSLATION_HALLUCINATION_RATIO_MIN: ${TRANSLATION_HALLUCINATION_RATIO_MIN}
      # ── Anomaly Detection ──
      ANOMALY_FORM_DROP_PCT: ${ANOMALY_FORM_DROP_PCT}
      ANOMALY_MASS_NEW_FORMS: ${ANOMALY_MASS_NEW_FORMS}
      ANOMALY_DOWNLOAD_FAIL_PCT: ${ANOMALY_DOWNLOAD_FAIL_PCT}
      ANOMALY_MIN_PDF_SIZE_BYTES: ${ANOMALY_MIN_PDF_SIZE_BYTES}
      ANOMALY_MAX_PDF_SIZE_BYTES: ${ANOMALY_MAX_PDF_SIZE_BYTES}
      ANOMALY_SCHEMA_ERRORS: ${ANOMALY_SCHEMA_ERRORS}
      # ── Scraper Tuning ──
      SCRAPER_BATCH_SIZE: ${SCRAPER_BATCH_SIZE}
      SCRAPER_BATCH_SLEEP_SEC: ${SCRAPER_BATCH_SLEEP_SEC}
      SCRAPER_PRE_DOWNLOAD_SLEEP: ${SCRAPER_PRE_DOWNLOAD_SLEEP}
      SCRAPER_REQUEST_TIMEOUT: ${SCRAPER_REQUEST_TIMEOUT}
      # ── Processor Tuning ──
      PDF_RENDER_DPI: ${PDF_RENDER_DPI}
      VALIDATION_CONFIDENCE_THRESHOLD: ${VALIDATION_CONFIDENCE_THRESHOLD}
      # ── Airflow (API Client) ──
      AIRFLOW_BASE_URL: ${AIRFLOW_BASE_URL}
      AIRFLOW_USERNAME: ${AIRFLOW_USERNAME}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD}
      # ── GCP credentials (empty — VM uses attached service account via ADC) ──
      GOOGLE_APPLICATION_CREDENTIALS: ''
      GCP_DVC_CREDENTIALS: ''

      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_LEGAL_LLM_MODEL: ${GROQ_LEGAL_LLM_MODEL}

    # No live code volume mounts in prod — everything is baked into the image.
    volumes:
      - shared-models:/app/models

    # ── GPU Configuration ──
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      model-loader:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Airflow: API Server ────────────────────────────────────────────────────
  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
      model-loader:
        condition: service_completed_successfully

  # ── Airflow: Scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
      model-loader:
        condition: service_completed_successfully

  # ── Airflow: DAG Processor ─────────────────────────────────────────────────
  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
      model-loader:
        condition: service_completed_successfully

  # ── Airflow: Triggerer ─────────────────────────────────────────────────────
  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
      model-loader:
        condition: service_completed_successfully

  # ── Airflow: Init (one-shot) ───────────────────────────────────────────────
  # Responsibility: DB migrate + admin user creation ONLY.
  # Model loading is handled by the separate model-loader service so that a
  # model update never forces a full-stack restart.
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/data/forms /opt/airflow/forms /opt/airflow/models /opt/airflow/logs
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/data /opt/airflow/forms /opt/airflow/models /opt/airflow/logs
        /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: "0:0"
    volumes: *airflow-common-volumes

  # ── Model Loader (one-shot) ────────────────────────────────────────────────
  # Runs in parallel with airflow-init (no shared dependency between them).
  # Copies authoritative .dvc pointer files from the image layer into the
  # shared-models volume (overwriting any stale hashes from a previous image),
  # then pulls model blobs from GCS via ADC.
  #
  # To update a single model without full-stack downtime:
  #   docker compose -f docker-compose.prod.yml pull model-loader
  #   docker compose -f docker-compose.prod.yml up model-loader --force-recreate
  #   docker compose -f docker-compose.prod.yml restart api
  model-loader:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: ["-c", "/usr/local/bin/model-loader.sh"]
    environment:
      <<: *airflow-common-env
      MODEL_LOADER_MODE: prod
      DVC_NO_ANALYTICS: '1'
    volumes:
      - shared-models:/opt/airflow/models
    user: "0:0"
    restart: "no"
    # No depends_on — only needs the shared-models named volume (mounted before
    # container start) and GCS network access via ADC, both available immediately.

volumes:
  redis-data:
  airflow-logs:
  airflow-data:
  airflow-forms:
  shared-models:
  mlflow-state:
