# ══════════════════════════════════════════════════════════════════════════════
# docker-compose.prod.yml — CourtAccess AI (production VM)
#
# Differences from docker-compose.yml (local dev):
#   - No local postgres container — uses Cloud SQL directly via POSTGRES_HOST
#   - No live code volume mounts — code is baked into the Docker image
#   - No .git / .dvc / .config volume mounts — no local credentials needed
#   - VM's attached service account handles all GCP auth (ADC)
#   - GOOGLE_APPLICATION_CREDENTIALS and GCP_DVC_CREDENTIALS are empty
#   - _PIP_ADDITIONAL_REQUIREMENTS removed (use Dockerfile for prod deps)
#   - Redis port not exposed publicly
#   - Named volumes for logs, data, forms, models (no host bind mounts)
#   - dags/ is still a bind mount so DAGs can be updated via git pull
#     without rebuilding the image
#
# Run with:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
# ══════════════════════════════════════════════════════════════════════════════

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
    target: airflow
  environment:
    &airflow-common-env
    # ── Core ──
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${AIRFLOW_SECRET_KEY}

    # ── Auth ──
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.providers.fab.auth_manager.api.auth.backend.basic_auth'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_SECRET_KEY}

    # ── Database (Cloud SQL) ──
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${AIRFLOW_DB}

    # ── Scheduler ──
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'

    # ── courtaccess package path ──
    PYTHONPATH: /opt/airflow

    # ── Git/DVC ──
    GIT_DISCOVERY_ACROSS_FILESYSTEM: '1'

    # ── Redis ──
    REDIS_URL: ${REDIS_URL}

    # ── Application ──
    APP_ENV: ${APP_ENV}

    # ── Database URL ──
    DATABASE_URL: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}"

    # ── Google Cloud / GCS ──
    GCP_SERVICE_ACCOUNT_JSON: ${GCP_SERVICE_ACCOUNT_JSON}
    GCS_BUCKET_UPLOADS: ${GCS_BUCKET_UPLOADS}
    GCS_BUCKET_TRANSLATED: ${GCS_BUCKET_TRANSLATED}
    GCS_BUCKET_FORMS: ${GCS_BUCKET_FORMS}
    GCS_BUCKET_MODELS: ${GCS_BUCKET_MODELS}
    GCS_BUCKET_TRANSCRIPTS: ${GCS_BUCKET_TRANSCRIPTS}
    SIGNED_URL_EXPIRY_SECONDS: ${SIGNED_URL_EXPIRY_SECONDS}

    # ── Vertex AI ──
    VERTEX_PROJECT_ID: ${VERTEX_PROJECT_ID}
    VERTEX_LOCATION: ${VERTEX_LOCATION}
    VERTEX_LEGAL_LLM_MODEL: ${VERTEX_LEGAL_LLM_MODEL}
    LEGAL_VERIFY_TIMEOUT: ${LEGAL_VERIFY_TIMEOUT}

    # ── Feature flags ──
    USE_REAL_CLASSIFICATION: ${USE_REAL_CLASSIFICATION}
    USE_REAL_TRANSLATION: ${USE_REAL_TRANSLATION}
    USE_VERTEX_LEGAL_REVIEW: ${USE_VERTEX_LEGAL_REVIEW}
    USE_REAL_OCR: ${USE_REAL_OCR}
    USE_REAL_HANDWRITING_OCR: ${USE_REAL_HANDWRITING_OCR}

    # ── Model Paths (inside container) ──
    NLLB_MODEL_PATH: ${NLLB_MODEL_PATH}
    WHISPER_MODEL_PATH: ${WHISPER_MODEL_PATH}
    PIPER_TTS_ES_PATH: ${PIPER_TTS_ES_PATH}
    PIPER_TTS_PT_PATH: ${PIPER_TTS_PT_PATH}
    PIPER_TTS_EN_PATH: ${PIPER_TTS_EN_PATH}
    SILERO_VAD_MODEL_PATH: ${SILERO_VAD_MODEL_PATH}

    # ── Real-Time Speech Pipeline ──
    USE_REAL_SPEECH: ${USE_REAL_SPEECH}
    WHISPER_MODEL: ${WHISPER_MODEL}
    NLLB_MODEL: ${NLLB_MODEL}
    VAD_SPEECH_THRESHOLD: ${VAD_SPEECH_THRESHOLD}
    PIPER_VOICES_DIR: ${PIPER_VOICES_DIR}
    SESSION_RECORDINGS_DIR: ${SESSION_RECORDINGS_DIR}
    TURN_GRACE_A_MS: ${TURN_GRACE_A_MS}
    TURN_GRACE_B_MS: ${TURN_GRACE_B_MS}
    TTS_LOCKOUT_BUFFER_MS: ${TTS_LOCKOUT_BUFFER_MS}

    # ── Monitoring & Bias Thresholds ──
    BIAS_UNDERSERVED_THRESHOLD: ${BIAS_UNDERSERVED_THRESHOLD}
    BIAS_TRANSLATION_COVERAGE_MIN: ${BIAS_TRANSLATION_COVERAGE_MIN}
    BIAS_LANGUAGE_GAP_MAX: ${BIAS_LANGUAGE_GAP_MAX}

    # ── Model & Extraction Overrides ──
    OCR_CONFIDENCE_THRESHOLD: ${OCR_CONFIDENCE_THRESHOLD}
    VERTEX_MAX_RETRIES: ${VERTEX_MAX_RETRIES}
    TRANSLATION_HALLUCINATION_RATIO_MAX: ${TRANSLATION_HALLUCINATION_RATIO_MAX}
    TRANSLATION_HALLUCINATION_RATIO_MIN: ${TRANSLATION_HALLUCINATION_RATIO_MIN}

    # ── Anomaly Detection Thresholds ──
    ANOMALY_FORM_DROP_PCT: ${ANOMALY_FORM_DROP_PCT}
    ANOMALY_MASS_NEW_FORMS: ${ANOMALY_MASS_NEW_FORMS}
    ANOMALY_DOWNLOAD_FAIL_PCT: ${ANOMALY_DOWNLOAD_FAIL_PCT}
    ANOMALY_MIN_PDF_SIZE_BYTES: ${ANOMALY_MIN_PDF_SIZE_BYTES}
    ANOMALY_MAX_PDF_SIZE_BYTES: ${ANOMALY_MAX_PDF_SIZE_BYTES}
    ANOMALY_SCHEMA_ERRORS: ${ANOMALY_SCHEMA_ERRORS}

    # ── Scraper Tuning ──
    SCRAPER_BATCH_SIZE: ${SCRAPER_BATCH_SIZE}
    SCRAPER_BATCH_SLEEP_SEC: ${SCRAPER_BATCH_SLEEP_SEC}
    SCRAPER_PRE_DOWNLOAD_SLEEP: ${SCRAPER_PRE_DOWNLOAD_SLEEP}
    SCRAPER_REQUEST_TIMEOUT: ${SCRAPER_REQUEST_TIMEOUT}

    # ── Processor Tuning ──
    PDF_RENDER_DPI: ${PDF_RENDER_DPI}
    VALIDATION_CONFIDENCE_THRESHOLD: ${VALIDATION_CONFIDENCE_THRESHOLD}

    # ── GCP credentials ──
    # Empty in prod — VM's attached service account handles auth via ADC.
    # No key files needed.
    GOOGLE_APPLICATION_CREDENTIALS: ''
    GCP_DVC_CREDENTIALS: ''

  env_file:
    - .env.production

  volumes:
    &airflow-common-volumes
    # dags/ is a bind mount so DAG updates via git pull take effect
    # without rebuilding the image.
    - ./dags:/opt/airflow/dags
    # Named volumes — no host bind mounts in prod
    - airflow-logs:/opt/airflow/logs
    - airflow-data:/opt/airflow/data
    - airflow-forms:/opt/airflow/forms
    - shared-models:/opt/airflow/models

  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  # Port NOT exposed in prod — only accessible within the Docker network.
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # ── FastAPI ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: gpu.Dockerfile
      args:
        # VITE_* vars are baked into the frontend bundle at build time.
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "8000:8000"
    environment:
      # ── Application ──
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SIGNED_URL_EXPIRY_SECONDS: ${SIGNED_URL_EXPIRY_SECONDS}
      # ── Database (Cloud SQL) ──
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      # ── Google Cloud ──
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_REGION: ${GCP_REGION}
      GCS_BUCKET_UPLOADS: ${GCS_BUCKET_UPLOADS}
      GCS_BUCKET_TRANSLATED: ${GCS_BUCKET_TRANSLATED}
      GCS_BUCKET_FORMS: ${GCS_BUCKET_FORMS}
      GCS_BUCKET_MODELS: ${GCS_BUCKET_MODELS}
      GCS_BUCKET_TRANSCRIPTS: ${GCS_BUCKET_TRANSCRIPTS}
      GCP_SERVICE_ACCOUNT_JSON: ''
      # ── Auth (GCIP / Firebase) ──
      GCIP_API_KEY: ${GCIP_API_KEY}
      GCIP_AUTH_DOMAIN: ${GCIP_AUTH_DOMAIN}
      GCIP_PROJECT_ID: ${GCIP_PROJECT_ID}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      ALGORITHM: ${ALGORITHM}
      ROOM_JWT_SECRET: ${ROOM_JWT_SECRET}
      ROOM_JWT_EXPIRY_HOURS: ${ROOM_JWT_EXPIRY_HOURS}
      ROOM_CODE_EXPIRY_MINUTES: ${ROOM_CODE_EXPIRY_MINUTES}
      # ── Vertex AI ──
      VERTEX_PROJECT_ID: ${VERTEX_PROJECT_ID}
      VERTEX_LOCATION: ${VERTEX_LOCATION}
      VERTEX_LEGAL_LLM_MODEL: ${VERTEX_LEGAL_LLM_MODEL}
      LEGAL_VERIFY_TIMEOUT: ${LEGAL_VERIFY_TIMEOUT}
      # ── Redis ──
      REDIS_URL: ${REDIS_URL}
      # ── Feature Flags & Model Paths ──
      USE_REAL_CLASSIFICATION: ${USE_REAL_CLASSIFICATION}
      USE_REAL_TRANSLATION: ${USE_REAL_TRANSLATION}
      USE_VERTEX_LEGAL_REVIEW: ${USE_VERTEX_LEGAL_REVIEW}
      USE_REAL_OCR: ${USE_REAL_OCR}
      USE_REAL_HANDWRITING_OCR: ${USE_REAL_HANDWRITING_OCR}
      NLLB_MODEL_PATH: /app/models/nllb-200-distilled-1.3B-ct2
      WHISPER_MODEL_PATH: /app/models/whisper-large-v3
      PIPER_TTS_ES_PATH: /app/models/piper-tts-es
      PIPER_TTS_PT_PATH: /app/models/piper-tts-pt
      PIPER_TTS_EN_PATH: /app/models/piper-tts-en
      SILERO_VAD_MODEL_PATH: /app/models/silero-vad-v4/silero_vad.jit.pt
      # ── Real-Time Speech Pipeline ──
      USE_REAL_SPEECH: ${USE_REAL_SPEECH}
      WHISPER_MODEL: ${WHISPER_MODEL}
      NLLB_MODEL: ${NLLB_MODEL}
      VAD_SPEECH_THRESHOLD: ${VAD_SPEECH_THRESHOLD}
      PIPER_VOICES_DIR: ${PIPER_VOICES_DIR}
      SESSION_RECORDINGS_DIR: ${SESSION_RECORDINGS_DIR}
      TURN_GRACE_A_MS: ${TURN_GRACE_A_MS}
      TURN_GRACE_B_MS: ${TURN_GRACE_B_MS}
      TTS_LOCKOUT_BUFFER_MS: ${TTS_LOCKOUT_BUFFER_MS}
      # ── Monitoring & Bias Thresholds ──
      BIAS_UNDERSERVED_THRESHOLD: ${BIAS_UNDERSERVED_THRESHOLD}
      BIAS_TRANSLATION_COVERAGE_MIN: ${BIAS_TRANSLATION_COVERAGE_MIN}
      BIAS_LANGUAGE_GAP_MAX: ${BIAS_LANGUAGE_GAP_MAX}
      # ── Model & Extraction Overrides ──
      OCR_CONFIDENCE_THRESHOLD: ${OCR_CONFIDENCE_THRESHOLD}
      VERTEX_MAX_RETRIES: ${VERTEX_MAX_RETRIES}
      TRANSLATION_HALLUCINATION_RATIO_MAX: ${TRANSLATION_HALLUCINATION_RATIO_MAX}
      TRANSLATION_HALLUCINATION_RATIO_MIN: ${TRANSLATION_HALLUCINATION_RATIO_MIN}
      # ── Anomaly Detection ──
      ANOMALY_FORM_DROP_PCT: ${ANOMALY_FORM_DROP_PCT}
      ANOMALY_MASS_NEW_FORMS: ${ANOMALY_MASS_NEW_FORMS}
      ANOMALY_DOWNLOAD_FAIL_PCT: ${ANOMALY_DOWNLOAD_FAIL_PCT}
      ANOMALY_MIN_PDF_SIZE_BYTES: ${ANOMALY_MIN_PDF_SIZE_BYTES}
      ANOMALY_MAX_PDF_SIZE_BYTES: ${ANOMALY_MAX_PDF_SIZE_BYTES}
      ANOMALY_SCHEMA_ERRORS: ${ANOMALY_SCHEMA_ERRORS}
      # ── Scraper Tuning ──
      SCRAPER_BATCH_SIZE: ${SCRAPER_BATCH_SIZE}
      SCRAPER_BATCH_SLEEP_SEC: ${SCRAPER_BATCH_SLEEP_SEC}
      SCRAPER_PRE_DOWNLOAD_SLEEP: ${SCRAPER_PRE_DOWNLOAD_SLEEP}
      SCRAPER_REQUEST_TIMEOUT: ${SCRAPER_REQUEST_TIMEOUT}
      # ── Processor Tuning ──
      PDF_RENDER_DPI: ${PDF_RENDER_DPI}
      VALIDATION_CONFIDENCE_THRESHOLD: ${VALIDATION_CONFIDENCE_THRESHOLD}
      # ── Airflow (API Client) ──
      AIRFLOW_BASE_URL: ${AIRFLOW_BASE_URL}
      AIRFLOW_USERNAME: ${AIRFLOW_USERNAME}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD}
      # ── GCP credentials (empty — VM uses attached service account via ADC) ──
      GOOGLE_APPLICATION_CREDENTIALS: ''
      GCP_DVC_CREDENTIALS: ''

    # No live code volume mounts in prod — everything is baked into the image.
    volumes:
      - shared-models:/app/models

    # ── GPU Configuration ──
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Airflow: API Server ────────────────────────────────────────────────────
  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow: Scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow: DAG Processor ─────────────────────────────────────────────────
  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow: Triggerer ─────────────────────────────────────────────────────
  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow: Init (one-shot) ───────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/data/forms /opt/airflow/forms /opt/airflow/models /opt/airflow/logs
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/data /opt/airflow/forms /opt/airflow/models /opt/airflow/logs

        # In prod, DVC authenticates via the VM's attached service account (ADC).
        # No key file needed — just pull models directly from GCS.
        cd /opt/airflow
        if [ ! -d ".dvc" ]; then
          dvc init --no-scm
          echo "DVC initialized."
        fi

        # Configure GCS remote explicitly (no .dvc/config mounted in prod)
        dvc remote add -d gcs_remote gs://$${GCS_BUCKET_MODELS} 2>/dev/null || \
          dvc remote modify gcs_remote url gs://$${GCS_BUCKET_MODELS}

        dvc pull --allow-missing 2>&1 || \
          echo "[airflow-init] DVC pull failed — models must be pre-loaded into the models volume."
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/models 2>/dev/null || true

        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: "0:0"
    volumes: *airflow-common-volumes

volumes:
  redis-data:
  airflow-logs:
  airflow-data:
  airflow-forms:
  shared-models:
