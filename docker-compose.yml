# ══════════════════════════════════════════════════════════════════════════════
# docker-compose.yml — CourtAccess AI (local development)
#
# Services:
#   postgres          — shared DB for Airflow metadata + app data (dev only)
#   redis             — translation cache for LegalReviewer (dev only)
#   api               — FastAPI application server
#   airflow-apiserver — Airflow UI + REST API (port 8080)
#   airflow-scheduler — DAG scheduler
#   airflow-dag-processor — DAG file processor
#   airflow-triggerer — Deferred task triggerer
#   airflow-init      — One-shot: DB migrate + create admin user
#
# NOTE: GPU inference services (Whisper, NLLB, PaddleOCR) are defined here
# as stubs. They are disabled by default (profiles: [gpu]) and require a
# machine with NVIDIA drivers + nvidia-container-toolkit installed.
# ══════════════════════════════════════════════════════════════════════════════

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
    target: airflow
  environment:
    &airflow-common-env
    # ── Core ──
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${AIRFLOW_SECRET_KEY}

    # ── Auth ──
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.providers.fab.auth_manager.api.auth.backend.basic_auth'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_SECRET_KEY}

    # ── Database ──
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}

    # ── Scheduler ──
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'

    # ── courtaccess package path ──
    # Required: makes `from courtaccess.X import Y` work inside all DAGs.
    # The package is installed via `pip install -e /opt/airflow/` in the
    # Dockerfile airflow target, but PYTHONPATH is set as a safety net for
    # local volume mounts where the install may not have run yet.
    PYTHONPATH: /opt/airflow

    # ── Git/DVC ──
    # Required: DVC needs to find .git across the Docker volume mount boundary.
    GIT_DISCOVERY_ACROSS_FILESYSTEM: '1'

    # ── Redis (translation cache) ──
    REDIS_URL: redis://redis:6379

    # ── Additional pip packages (dev only — prefer Dockerfile for production) ──
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}

  volumes:
    &airflow-common-volumes
    - ./dags:/opt/airflow/dags
    - ./courtaccess:/opt/airflow/courtaccess    # live code changes in dev
    - ./logs:/opt/airflow/logs
    - ./data:/opt/airflow/data
    - ./forms:/opt/airflow/forms
    - ./models:/opt/airflow/models
    # DVC needs access to .git (at monorepo root) and its own config + local remote
    - ./.git:/opt/airflow/.git
    - ./.dvc:/opt/airflow/.dvc
    - ./dvc_storage:/opt/airflow/dvc_storage

  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # ── FastAPI ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "8000:8000"
    environment:
      # ── Application ──
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SIGNED_URL_EXPIRY_SECONDS: ${SIGNED_URL_EXPIRY_SECONDS}
      # ── Database (POSTGRES_HOST/PORT resolved from env file) ──
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      # ── Google Cloud ──
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_REGION: ${GCP_REGION}
      GCS_BUCKET_UPLOADS: ${GCS_BUCKET_UPLOADS}
      GCS_BUCKET_TRANSLATED: ${GCS_BUCKET_TRANSLATED}
      GCS_BUCKET_FORMS: ${GCS_BUCKET_FORMS}
      GCS_BUCKET_MODELS: ${GCS_BUCKET_MODELS}
      GCP_SERVICE_ACCOUNT_JSON: ${GCP_SERVICE_ACCOUNT_JSON}
      # ── Auth (GCIP / Firebase) ──
      GCIP_API_KEY: ${GCIP_API_KEY}
      GCIP_AUTH_DOMAIN: ${GCIP_AUTH_DOMAIN}
      GCIP_PROJECT_ID: ${GCIP_PROJECT_ID}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      ALGORITHM: ${ALGORITHM}
      # ── Vertex AI ──
      VERTEX_PROJECT: ${VERTEX_PROJECT}
      VERTEX_LOCATION: ${VERTEX_LOCATION}
      LEGAL_LLM_MODEL: ${LEGAL_LLM_MODEL}
      LEGAL_VERIFY_TIMEOUT: ${LEGAL_VERIFY_TIMEOUT}
      # ── Redis & MLflow ──
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      # ── Feature Flags & Model Paths ──
      USE_REAL_CLASSIFICATION: ${USE_REAL_CLASSIFICATION}
      USE_REAL_TRANSLATION: ${USE_REAL_TRANSLATION}
      USE_REAL_LEGAL_REVIEW: ${USE_REAL_LEGAL_REVIEW}
      USE_VERTEX_LEGAL_REVIEW: ${USE_VERTEX_LEGAL_REVIEW}
      USE_REAL_OCR: ${USE_REAL_OCR}
      NLLB_MODEL_PATH: ${NLLB_MODEL_PATH}
      WHISPER_MODEL_PATH: ${WHISPER_MODEL_PATH}
      PIPER_TTS_ES_PATH: ${PIPER_TTS_ES_PATH}
      PIPER_TTS_PT_PATH: ${PIPER_TTS_PT_PATH}
      # ── Airflow (API Client) ──
      AIRFLOW_BASE_URL: ${AIRFLOW_BASE_URL}
      AIRFLOW_USERNAME: ${AIRFLOW_USERNAME}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD}
      # ── Git/DVC ──
      GIT_DISCOVERY_ACROSS_FILESYSTEM: '1'

    volumes:
      - ./courtaccess:/app/courtaccess   # live code reloading in dev
      - ./api:/app/api
      - ./db:/app/db
      - ./models:/app/models             # DVC-tracked model weights
      - ./.git:/app/.git                 # DVC needs git history
      - ./.dvc:/app/.dvc                 # DVC remote config
      - ./data:/app/data                 # glossaries, schemas
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Airflow: API Server (UI + REST API) ────────────────────────────────────
  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow: Scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow: DAG Processor ─────────────────────────────────────────────────
  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow: Triggerer ─────────────────────────────────────────────────────
  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow: Init (one-shot) ───────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/data/forms /opt/airflow/forms /opt/airflow/models /opt/airflow/dvc_storage /opt/airflow/logs
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/data /opt/airflow/forms /opt/airflow/models /opt/airflow/dvc_storage /opt/airflow/logs

        # Git safe.directory — required because repo is owned by host user but
        # accessed by airflow user (UID 50000) inside the container.
        git config --global --add safe.directory /opt/airflow

        # Initialize DVC if needed, then always ensure remote is configured.
        # This is idempotent — works whether .dvc/ is fresh or pre-existing.
        cd /opt/airflow
        if [ ! -d ".dvc" ]; then
          dvc init
          echo "DVC initialized."
        fi
        dvc remote add -d local_storage /opt/airflow/dvc_storage 2>/dev/null || \
          dvc remote modify local_storage url /opt/airflow/dvc_storage
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/.dvc
        echo "DVC remote configured: $(dvc remote list)"

        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: "0:0"
    volumes: *airflow-common-volumes

  # ── GPU: Whisper ASR  (disabled by default, requires nvidia-container-toolkit)
  whisper:
    build:
      context: .
      dockerfile: gpu.Dockerfile
    profiles: [gpu]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./models:/app/models
      - ./courtaccess:/app/courtaccess
    environment:
      MODEL_NAME: whisper-large-v3
    restart: unless-stopped

volumes:
  postgres-db-volume:
  redis-data:
