# ══════════════════════════════════════════════════════════════════════════════
# docker-compose.yml — CourtAccess AI (local development)
#
# Services:
#   postgres          — shared DB for Airflow metadata + app data (dev only)
#   redis             — translation cache for LegalReviewer (dev only)
#   mlflow            — MLflow Tracking Server UI (port 5000)
#   api               — FastAPI application server
#   airflow-apiserver — Airflow UI + REST API (port 8080)
#   airflow-scheduler — DAG scheduler
#   airflow-dag-processor — DAG file processor
#   airflow-triggerer — Deferred task triggerer
#   airflow-init      — One-shot: DB migrate + create admin user
#
# NOTE: GPU inference services (Whisper, NLLB, PaddleOCR) are defined here
# as stubs. They are disabled by default (profiles: [gpu]) and require a
# machine with NVIDIA drivers + nvidia-container-toolkit installed.
# ══════════════════════════════════════════════════════════════════════════════

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
    target: airflow
  environment:
    &airflow-common-env
    # ── Core ──
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${AIRFLOW_SECRET_KEY}

    # ── Auth ──
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.providers.fab.auth_manager.api.auth.backend.basic_auth'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_SECRET_KEY}

    # ── Database ──
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${AIRFLOW_DB}

    # ── Scheduler ──
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'

    # ── courtaccess package path ──
    PYTHONPATH: /opt/airflow

    # ── Git/DVC ──
    GIT_DISCOVERY_ACROSS_FILESYSTEM: '1'

    # ── Redis (translation cache) ──
    REDIS_URL: ${REDIS_URL}

    # ── MLflow ──
    MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}

    # ── Application ──
    APP_ENV: ${APP_ENV}

    # ── Database (sync psycopg2 — asyncpg is unusable in Airflow task processes) ──
    DATABASE_URL: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}"

    # ── Google Cloud / GCS ──
    GCP_SERVICE_ACCOUNT_JSON: ${GCP_SERVICE_ACCOUNT_JSON}
    GCS_BUCKET_UPLOADS: ${GCS_BUCKET_UPLOADS}
    GCS_BUCKET_TRANSLATED: ${GCS_BUCKET_TRANSLATED}
    SIGNED_URL_EXPIRY_SECONDS: ${SIGNED_URL_EXPIRY_SECONDS}

    # ── Vertex AI ──
    VERTEX_PROJECT_ID: ${VERTEX_PROJECT_ID}
    VERTEX_LOCATION: ${VERTEX_LOCATION}
    VERTEX_LEGAL_LLM_MODEL: ${VERTEX_LEGAL_LLM_MODEL}
    LEGAL_VERIFY_TIMEOUT: ${LEGAL_VERIFY_TIMEOUT}

    # ── Feature flags (controls stub vs real mode for every DAG task) ──
    USE_REAL_CLASSIFICATION: ${USE_REAL_CLASSIFICATION}
    USE_REAL_TRANSLATION: ${USE_REAL_TRANSLATION}
    USE_VERTEX_LEGAL_REVIEW: ${USE_VERTEX_LEGAL_REVIEW}
    USE_REAL_OCR: ${USE_REAL_OCR}
    NLLB_MODEL_PATH: /opt/airflow/models/nllb-200-distilled-1.3B-ct2
    WHISPER_MODEL_PATH: /opt/airflow/models/whisper-large-v3
    PIPER_TTS_ES_PATH: /opt/airflow/models/piper-tts-es
    PIPER_TTS_PT_PATH: /opt/airflow/models/piper-tts-pt

    # ── Monitoring & Bias Thresholds ──
    BIAS_UNDERSERVED_THRESHOLD: ${BIAS_UNDERSERVED_THRESHOLD}
    BIAS_TRANSLATION_COVERAGE_MIN: ${BIAS_TRANSLATION_COVERAGE_MIN}
    BIAS_LANGUAGE_GAP_MAX: ${BIAS_LANGUAGE_GAP_MAX}

    # ── Model & Extraction Overrides ──
    OCR_CONFIDENCE_THRESHOLD: ${OCR_CONFIDENCE_THRESHOLD}
    VERTEX_MAX_RETRIES: ${VERTEX_MAX_RETRIES}
    TRANSLATION_HALLUCINATION_RATIO_MAX: ${TRANSLATION_HALLUCINATION_RATIO_MAX}
    TRANSLATION_HALLUCINATION_RATIO_MIN: ${TRANSLATION_HALLUCINATION_RATIO_MIN}

    # ── Anomaly Detection Thresholds ──
    ANOMALY_FORM_DROP_PCT: ${ANOMALY_FORM_DROP_PCT}
    ANOMALY_MASS_NEW_FORMS: ${ANOMALY_MASS_NEW_FORMS}
    ANOMALY_DOWNLOAD_FAIL_PCT: ${ANOMALY_DOWNLOAD_FAIL_PCT}
    ANOMALY_MIN_PDF_SIZE_BYTES: ${ANOMALY_MIN_PDF_SIZE_BYTES}
    ANOMALY_MAX_PDF_SIZE_BYTES: ${ANOMALY_MAX_PDF_SIZE_BYTES}
    ANOMALY_SCHEMA_ERRORS: ${ANOMALY_SCHEMA_ERRORS}

    # ── Scraper Tuning ──
    SCRAPER_BATCH_SIZE: ${SCRAPER_BATCH_SIZE}
    SCRAPER_BATCH_SLEEP_SEC: ${SCRAPER_BATCH_SLEEP_SEC}
    SCRAPER_PRE_DOWNLOAD_SLEEP: ${SCRAPER_PRE_DOWNLOAD_SLEEP}
    SCRAPER_REQUEST_TIMEOUT: ${SCRAPER_REQUEST_TIMEOUT}

    # ── Processor Tuning ──
    PDF_RENDER_DPI: ${PDF_RENDER_DPI}
    VALIDATION_CONFIDENCE_THRESHOLD: ${VALIDATION_CONFIDENCE_THRESHOLD}

    # ── Additional pip packages (dev only — prefer Dockerfile for production) ──
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}

    # ── Firebase ──
    GOOGLE_APPLICATION_CREDENTIALS: '/opt/airflow/${GOOGLE_APPLICATION_CREDENTIALS}'

  env_file:
    - .env

  volumes:
    &airflow-common-volumes
    - ./dags:/opt/airflow/dags
    - ./courtaccess:/opt/airflow/courtaccess    # live code changes in dev
    - ./db:/opt/airflow/db                      # Added missing db module
    - ./logs:/opt/airflow/logs
    - ./data:/opt/airflow/data
    - ./forms:/opt/airflow/forms
    - ./models:/opt/airflow/models
    # DVC needs access to .git (at monorepo root) and its own config + local remote
    - ./.git:/opt/airflow/.git
    - ./.dvc:/opt/airflow/.dvc
    - ./dvc_storage:/opt/airflow/dvc_storage
    - ./.config:/opt/airflow/.config:ro

  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./db/init-airflow-db.sql:/docker-entrypoint-initdb.d/10-init-airflow-db.sql
      - ./db/init-mlflow-db.sql:/docker-entrypoint-initdb.d/20-init-mlflow-db.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # ── MLflow Tracking Server ─────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mlflow
      --artifacts-destination gs://${GCS_BUCKET_MODELS}/mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    environment:
      # GCS auth — ADC from the mounted .config directory
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
    volumes:
      - ./.config:/root/.config:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── FastAPI ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "8000:8000"
    environment:
      # ── Application ──
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SIGNED_URL_EXPIRY_SECONDS: ${SIGNED_URL_EXPIRY_SECONDS}
      # ── Database (POSTGRES_HOST/PORT resolved from env file) ──
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      # ── Google Cloud ──
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_REGION: ${GCP_REGION}
      GCS_BUCKET_UPLOADS: ${GCS_BUCKET_UPLOADS}
      GCS_BUCKET_TRANSLATED: ${GCS_BUCKET_TRANSLATED}
      GCS_BUCKET_FORMS: ${GCS_BUCKET_FORMS}
      GCS_BUCKET_MODELS: ${GCS_BUCKET_MODELS}
      GCP_SERVICE_ACCOUNT_JSON: ${GCP_SERVICE_ACCOUNT_JSON}
      # ── Auth (GCIP / Firebase) ──
      GCIP_API_KEY: ${GCIP_API_KEY}
      GCIP_AUTH_DOMAIN: ${GCIP_AUTH_DOMAIN}
      GCIP_PROJECT_ID: ${GCIP_PROJECT_ID}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      ALGORITHM: ${ALGORITHM}
      # ── Vertex AI ──
      VERTEX_PROJECT_ID: ${VERTEX_PROJECT_ID}
      VERTEX_LOCATION: ${VERTEX_LOCATION}
      VERTEX_LEGAL_LLM_MODEL: ${VERTEX_LEGAL_LLM_MODEL}
      LEGAL_VERIFY_TIMEOUT: ${LEGAL_VERIFY_TIMEOUT}
      # ── Redis & MLflow ──
      REDIS_URL: ${REDIS_URL}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      # ── Feature Flags & Model Paths ──
      USE_REAL_CLASSIFICATION: ${USE_REAL_CLASSIFICATION}
      USE_REAL_TRANSLATION: ${USE_REAL_TRANSLATION}
      USE_VERTEX_LEGAL_REVIEW: ${USE_VERTEX_LEGAL_REVIEW}
      USE_REAL_OCR: ${USE_REAL_OCR}
      NLLB_MODEL_PATH: /app/models/nllb-200-distilled-1.3B-ct2
      WHISPER_MODEL_PATH: /app/models/whisper-large-v3
      PIPER_TTS_ES_PATH: /app/models/piper-tts-es
      PIPER_TTS_PT_PATH: /app/models/piper-tts-pt

      # ── Monitoring & Bias Thresholds ──
      BIAS_UNDERSERVED_THRESHOLD: ${BIAS_UNDERSERVED_THRESHOLD}
      BIAS_TRANSLATION_COVERAGE_MIN: ${BIAS_TRANSLATION_COVERAGE_MIN}
      BIAS_LANGUAGE_GAP_MAX: ${BIAS_LANGUAGE_GAP_MAX}

      # ── Model & Extraction Overrides ──
      OCR_CONFIDENCE_THRESHOLD: ${OCR_CONFIDENCE_THRESHOLD}
      VERTEX_MAX_RETRIES: ${VERTEX_MAX_RETRIES}
      TRANSLATION_HALLUCINATION_RATIO_MAX: ${TRANSLATION_HALLUCINATION_RATIO_MAX}
      TRANSLATION_HALLUCINATION_RATIO_MIN: ${TRANSLATION_HALLUCINATION_RATIO_MIN}

      # ── Anomaly Detection Thresholds ──
      ANOMALY_FORM_DROP_PCT: ${ANOMALY_FORM_DROP_PCT}
      ANOMALY_MASS_NEW_FORMS: ${ANOMALY_MASS_NEW_FORMS}
      ANOMALY_DOWNLOAD_FAIL_PCT: ${ANOMALY_DOWNLOAD_FAIL_PCT}
      ANOMALY_MIN_PDF_SIZE_BYTES: ${ANOMALY_MIN_PDF_SIZE_BYTES}
      ANOMALY_MAX_PDF_SIZE_BYTES: ${ANOMALY_MAX_PDF_SIZE_BYTES}
      ANOMALY_SCHEMA_ERRORS: ${ANOMALY_SCHEMA_ERRORS}

      # ── Scraper Tuning ──
      SCRAPER_BATCH_SIZE: ${SCRAPER_BATCH_SIZE}
      SCRAPER_BATCH_SLEEP_SEC: ${SCRAPER_BATCH_SLEEP_SEC}
      SCRAPER_PRE_DOWNLOAD_SLEEP: ${SCRAPER_PRE_DOWNLOAD_SLEEP}
      SCRAPER_REQUEST_TIMEOUT: ${SCRAPER_REQUEST_TIMEOUT}

      # ── Processor Tuning ──
      PDF_RENDER_DPI: ${PDF_RENDER_DPI}
      VALIDATION_CONFIDENCE_THRESHOLD: ${VALIDATION_CONFIDENCE_THRESHOLD}

      # ── Airflow (API Client) ──
      AIRFLOW_BASE_URL: ${AIRFLOW_BASE_URL}
      AIRFLOW_USERNAME: ${AIRFLOW_USERNAME}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD}
      # ── Git/DVC ──
      GIT_DISCOVERY_ACROSS_FILESYSTEM: '1'

      GOOGLE_APPLICATION_CREDENTIALS: '/app/${GOOGLE_APPLICATION_CREDENTIALS}'

    volumes:
      - ./courtaccess:/app/courtaccess   # live code reloading in dev
      - ./api:/app/api
      - ./db:/app/db
      - ./models:/app/models             # DVC-tracked model weights
      - ./.git:/app/.git                 # DVC needs git history
      - ./.dvc:/app/.dvc                 # DVC remote config
      - ./data:/app/data                 # glossaries, schemas
      - ./.config:/app/.config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
      # Wait for airflow-init to finish before running alembic migrations, so
      # the two init processes do not race to write the schema simultaneously.
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Airflow: API Server (UI + REST API) ────────────────────────────────────
  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow: Scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow: DAG Processor ─────────────────────────────────────────────────
  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow: Triggerer ─────────────────────────────────────────────────────
  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow: Init (one-shot) ───────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/data/forms /opt/airflow/forms /opt/airflow/models /opt/airflow/dvc_storage /opt/airflow/logs
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/data /opt/airflow/forms /opt/airflow/models /opt/airflow/dvc_storage /opt/airflow/logs

        # Git safe.directory — required because repo is owned by host user but
        # accessed by airflow user (UID 50000) inside the container.
        git config --global --add safe.directory /opt/airflow

        # Initialize DVC if needed, then configure the local fallback remote.
        # --local writes to .dvc/config.local (gitignored), NOT .dvc/config,
        # so the host's default remote (gcs) is never overwritten by this container.
        cd /opt/airflow
        if [ ! -d ".dvc" ]; then
          dvc init
          echo "DVC initialized."
        fi
        dvc remote add --local local_storage /opt/airflow/dvc_storage 2>/dev/null || \
          dvc remote modify --local local_storage url /opt/airflow/dvc_storage
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/.dvc
        echo "DVC remote configured: $(dvc remote list)"

        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: "0:0"
    volumes: *airflow-common-volumes

  # ── GPU: Whisper ASR  (disabled by default, requires nvidia-container-toolkit)
  whisper:
    build:
      context: .
      dockerfile: gpu.Dockerfile
    profiles: [gpu]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./models:/app/models
      - ./courtaccess:/app/courtaccess
    environment:
      MODEL_NAME: whisper-large-v3
    restart: unless-stopped

volumes:
  postgres-db-volume:
  redis-data:
